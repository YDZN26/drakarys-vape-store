<div class="result-count" *ngIf="!loading || products.length > 0">
  <span>{{ resultCount }} {{ resultCount === 1 ? 'product' : 'products' }} found</span>
</div>

<div class="products-grid">
  <app-product-card
    *ngFor="let item of products"
    [item]="item"
    (productTap)="onProductTap($event)"
  ></app-product-card>
</div>

<div class="loading-skeleton" *ngIf="loading && products.length === 0">
  <ion-card *ngFor="let i of [1,2,3,4,5,6]" class="skeleton-card">
    <ion-skeleton-text animated style="height: 160px;"></ion-skeleton-text>
    <ion-card-content>
      <ion-skeleton-text animated style="width: 60%; height: 12px;"></ion-skeleton-text>
      <ion-skeleton-text animated style="width: 80%; height: 16px; margin-top: 4px;"></ion-skeleton-text>
      <ion-skeleton-text animated style="width: 40%; height: 14px; margin-top: 4px;"></ion-skeleton-text>
    </ion-card-content>
  </ion-card>
</div>

<ion-infinite-scroll
  [disabled]="!hasMore"
  (ionInfinite)="onInfiniteScroll($any($event))"
>
  <ion-infinite-scroll-content
    loadingSpinner="bubbles"
    loadingText="Loading more..."
  ></ion-infinite-scroll-content>
</ion-infinite-scroll>
